name: Release Plugin

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix, for example 0.1.0"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Update release metadata
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          node -e "const fs=require('fs'); const version=process.env.VERSION; const pkgPath='package.json'; const manifestPath='manifest.json'; const versionsPath='versions.json'; const pkg=JSON.parse(fs.readFileSync(pkgPath,'utf8')); const manifest=JSON.parse(fs.readFileSync(manifestPath,'utf8')); const versions=JSON.parse(fs.readFileSync(versionsPath,'utf8')); pkg.version=version; manifest.version=version; versions[version]=manifest.minAppVersion; fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n'); fs.writeFileSync(manifestPath, JSON.stringify(manifest, null, 2) + '\n'); fs.writeFileSync(versionsPath, JSON.stringify(versions, null, 2) + '\n');"

      - name: Build plugin
        run: pnpm build

      - name: Commit release metadata
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json manifest.json versions.json
          git commit -m "Release v${VERSION}" || echo "No metadata changes to commit"
          git push

      - name: Create and push tag
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          gh release create "v${VERSION}" \
            build/main.js \
            build/manifest.json \
            build/styles.css \
            build/versions.json \
            --generate-notes \
            --title "v${VERSION}"
